<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Login Code</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1b1b1d;line-height:1.5;">
  <div style="max-width:560px;margin:40px auto 0 auto;padding:0 16px;">
    <div style="background-color:#ffffff;border:1px solid #d7d9df;border-radius:16px;overflow:hidden;box-shadow:0 14px 36px rgba(27,27,29,0.08);">
      <div style="height:4px;background:linear-gradient(90deg,#4d4d4d 0%,#2d6d3a 55%,#4aba5e 100%);"></div>

      <div style="padding:32px 32px 20px 32px;text-align:center;border-bottom:1px solid #eceff2;background:linear-gradient(180deg,#fbfcfd 0%,#f7f9fb 100%);">
        <div style="display:inline-block;font-size:28px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:#1b1b1d;background:linear-gradient(90deg,#4d4d4d 0%,#2d6d3a 55%,#4aba5e 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">
          firmä
        </div>
      </div>

      <div style="padding:30px 32px 32px 32px;">
        <h1 style="margin:0 0 10px 0;font-size:22px;font-weight:800;letter-spacing:-0.02em;color:#1b1b1d;text-align:center;">
          Sign in to your account
        </h1>
        <p style="margin:0 0 24px 0;font-size:15px;color:#45474c;text-align:center;">
          Use this one-time code to access your account.
        </p>

        <div style="margin:0 0 22px 0;padding:18px 16px;text-align:center;border-radius:12px;border:1px solid #c6c6cc;background:linear-gradient(180deg,#f8f9fa 0%,#eceff1 100%);">
          <span style="display:block;font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,Courier,monospace;font-size:36px;font-weight:800;letter-spacing:0.24em;color:#2d6d3a;">
            {{ .Token }}
          </span>
        </div>

        <p style="margin:0;font-size:13px;color:#76777d;text-align:center;">
          This code expires in 10 minutes. If you did not request this email, you can safely ignore it.
        </p>
      </div>

      <div style="padding:18px 32px;text-align:center;border-top:1px solid #eceff2;background-color:#f7f9fb;">
        <p style="margin:0;font-size:12px;color:#76777d;">
          &copy; 2026 firmä. All rights reserved.
        </p>
      </div>
    </div>
  </div>
</body>
</html>
